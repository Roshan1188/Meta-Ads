# Local Postgres for development. `docker compose up -d`
# Matches the default DATABASE_URL in .env.example.
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: autoads
    ports:
      - "5432:5432"
    volumes:
      - autoads_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  autoads_pgdata:
